sensors:
  - sensor_d405
sensor_d405:
  filtered_cloud_topic: filtered_cloud
  max_range: 0.7 # meters. Can actually be accurate up to 1.2 meters, but that's probably more computationally expensive
  max_update_rate: 50.0
  padding_offset: 0.1 # 0.01 doesn't make it smaller
  padding_scale: 1.0
  point_cloud_topic: /arm/D405/depth/color/points
  point_subsample: 1 # 10 doesn't make it smaller
  sensor_plugin: occupancy_map_monitor/PointCloudOctomapUpdater
## Uncomment the line above if you want to see the blocks generated by the depth data